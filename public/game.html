<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>훌라 - 게임</title>
  <link rel="stylesheet" href="css/style.css?v=23">
</head>
<body class="game-body">

  <div id="network-banner">🔌 연결이 끊겼습니다. 재연결 중...</div>

  <!-- Game Table -->
  <div id="game-table">

    <!-- 대기자 뱃지 - 플레이어/대기자 모두에게 노출 -->
    <div id="waiter-badge" style="display:none">
      <div id="waiter-badge-text"></div>
    </div>

    <!-- Top player -->
    <div class="player-area top" id="player-top">
      <div class="player-info">
        <span class="player-name"></span>
        <span class="player-balance"></span>
        <span class="player-registered"></span>
      </div>
      <div class="player-cards"></div>
    </div>

    <!-- Left player -->
    <div class="player-area left" id="player-left">
      <div class="player-info">
        <span class="player-name"></span>
        <span class="player-balance"></span>
        <span class="player-registered"></span>
      </div>
      <div class="player-cards"></div>
    </div>

    <!-- Right player -->
    <div class="player-area right" id="player-right">
      <div class="player-info">
        <span class="player-name"></span>
        <span class="player-balance"></span>
        <span class="player-registered"></span>
      </div>
      <div class="player-cards"></div>
    </div>

    <!-- Center area -->
    <div id="center-area">
      <!-- Registered combos -->
      <div id="combos-area"></div>

      <!-- Deck and discard -->
      <div id="piles-area">
        <div id="deck-pile" class="pile">
          <div class="card card-back" id="deck-card"></div>
          <div class="pile-label" id="deck-count"></div>
        </div>
        <div id="discard-pile" class="pile">
          <div class="card" id="discard-card"></div>
        </div>
        <button id="btn-thankyou" class="btn-thankyou" disabled><div class="btn-thankyou-hand"></div></button>
      </div>
    </div>

    <!-- Bottom: my area -->
    <div id="my-area">
      <div id="my-left-col">
        <div id="my-info">
          <div class="my-character" id="my-character">
            <span id="my-name"></span>
            <span id="my-balance"></span>
            <span id="my-registered"></span>
          </div>
        </div>
        <div id="timer-area">
          <svg id="timer-svg" viewBox="0 0 60 60">
            <circle class="timer-bg" cx="30" cy="30" r="26"/>
            <circle class="timer-bar" id="timer-circle" cx="30" cy="30" r="26"
              stroke-dasharray="163.4" stroke-dashoffset="0"/>
            <text class="timer-text" id="timer-text" x="30" y="35">60</text>
          </svg>
        </div>
      </div>
      <div id="my-hand-area">
        <div id="my-hand"></div>
        <div id="action-buttons">
          <button id="btn-register" class="btn-action" disabled>등록</button>
          <button id="btn-attach" class="btn-action" disabled>붙이기</button>
          <button id="btn-discard" class="btn-action" disabled>버리기</button>
          <button id="btn-cancel-thankyou" class="btn-action danger" style="display:none">취소</button>
        </div>
        <div id="sort-buttons">
          <button id="btn-sort-num" class="btn-sort">숫자순</button>
          <button id="btn-sort-suit" class="btn-sort">모양순</button>
          <button id="btn-sort-off" class="btn-sort">원래대로</button>
        </div>
      </div>
    </div>

    <!-- 관전(대기) 패널 - 진행중인 방에 대기자로 들어왔을 때만 my-area 자리를 대체 -->
    <div id="spectator-panel" style="display:none">
      <div id="spectator-seat0">
        <span id="spectator-seat0-name"></span>
        <div id="spectator-seat0-cards" class="player-cards"></div>
      </div>
      <div id="spectator-msg">🎬 게임을 구경하고 있어요</div>
      <button id="btn-spectator-leave" class="btn-secondary">나가기</button>
    </div>

    <!-- Game log -->
    <div id="game-log"></div>

    <!-- Admin controls -->
    <div id="admin-controls" style="display:none">
      <button id="btn-pause" class="icon-btn pause" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg></button>
      <button id="btn-admin-stop" class="icon-btn stop"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="5" y1="5" x2="19" y2="19"/><line x1="19" y1="5" x2="5" y2="19"/></svg></button>
    </div>
  </div>

  <!-- 일시정지 오버레이 (싱글모드) -->
  <div id="pause-overlay">
    <div class="pause-icon">❚❚</div>
    <div class="pause-title">일시정지 중</div>
    <div class="pause-desc">게임이 멈춰있어요. 준비되면 재개를 눌러주세요.</div>
    <button id="btn-resume" class="btn-resume">▶ 재개</button>
  </div>

  <!-- Attach target selector modal -->
  <div id="modal-attach" class="modal" style="display:none">
    <div class="modal-box">
      <h3>붙일 조합 선택</h3>
      <div id="attach-combo-list"></div>
      <button id="btn-attach-cancel" class="btn-secondary">취소</button>
    </div>
  </div>

  <!-- Thank you cancel modal -->
  <div id="modal-thankyou-lock" class="modal" style="display:none">
    <div class="modal-box">
      <h3>땡큐!</h3>
      <p id="thankyou-card-name"></p>
      <button id="btn-thankyou-cancel" class="btn-danger">취소 (벌금 부과)</button>
    </div>
  </div>

  <!-- 시간초과 자동 취소 모달 -->
  <div id="modal-auto-cancel" class="modal" style="display:none">
    <div class="modal-box" style="text-align:center;gap:16px">
      <h3>⏰ 시간 초과</h3>
      <p>60초가 지나 땡큐가 자동 취소되었습니다.<br><span style="color:#f44336">벌금 <strong id="auto-cancel-penalty"></strong>이 부과됩니다.</span></p>
      <button id="btn-auto-cancel-ok" class="btn-primary">확인</button>
    </div>
  </div>

  <!-- 땡큐 취소 확인 모달 -->
  <div id="modal-cancel-confirm" class="modal" style="display:none">
    <div class="modal-box" style="text-align:center;gap:16px">
      <h3>취소 확인</h3>
      <p id="cancel-penalty-text" style="color:#f44336;font-size:14px">취소하면 벌금 <strong>-300원</strong>이 부과됩니다.<br>나머지 플레이어에게 +100원씩 지급됩니다.</p>
      <div style="display:flex;gap:8px;justify-content:center">
        <button id="btn-cancel-confirm-yes" class="btn-danger">확인</button>
        <button id="btn-cancel-confirm-no" class="btn-secondary">닫기</button>
      </div>
    </div>
  </div>

  <!-- Floating notifications -->
  <div id="notifications"></div>

  <!-- 훌라 전용 오버레이 (승리 화면 뜨기 전, 배경 딤+블러 위에 단독 재생) -->
  <div id="overlay-hula" style="display:none">
    <span id="win-hula-slot" class="hula-stamp">
      <span class="hula-rays"></span>
      <span class="hula-burst"></span>
      <span class="hula-text">훌라!</span>
    </span>
  </div>

  <!-- 깜짝 2배 이벤트 판 오버레이 (딜링 직후 3초 재생 후 완전히 사라짐) -->
  <div id="overlay-double" style="display:none">
    <span class="hula-stamp double-stamp">
      <span class="hula-rays"></span>
      <span class="double-text">⚡2배 이벤트⚡</span>
      <span class="double-sub">이번 판 승자는 정산 금액 2배!</span>
    </span>
  </div>

  <!-- Game End overlay -->
  <div id="overlay-gameend" style="display:none">
    <div id="confetti-container"></div>
    <div id="gameend-box">
      <div id="win-trophy">🏆</div>
      <div id="win-announcement">
        <span id="win-rank1-badge-slot" class="rank1-badge-slot">
          <span class="rank1-rays"></span>
          <span class="rank1-burst"></span>
          <span id="win-rank1-badge" class="rank1-badge-emoji"></span>
        </span>
        <span id="win-avatar"></span>
        <span id="win-name"></span>
      </div>
      <div id="win-message"></div>
      <div id="win-rank1-sub" class="rank1-sub"></div>
      <button id="btn-gameend-ok" class="btn-primary">확인</button>
    </div>
  </div>

  <!-- Results overlay -->
  <div id="overlay-results" style="display:none">
    <div id="results-box">
      <h2>정산 결과</h2>
      <div id="double-event-banner" style="display:none">⚡ 이번 판은 2배 이벤트였어요!</div>
      <div id="results-list"></div>
      <div style="display:flex;gap:12px;justify-content:center">
        <button id="btn-results-again" class="btn-primary">한 판 더!</button>
        <button id="btn-results-ready" class="btn-ready" style="display:none">준비</button>
        <button id="btn-results-home" class="btn-secondary">메인으로</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/game.js?v=27"></script>
  <script src="js/presence.js?v=2"></script>
</body>
</html>
